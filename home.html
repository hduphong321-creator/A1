<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
<div class="header">
    <h2 id="hello">Chào mừng trở lại!</h2>
    <div class="header-right">
        <a href="saved.html" class="saved-link"> 📚 Tin đọc sau </a>
        <button onclick="logout()">Đăng xuất</button>
    </div>
</div>
<div class="container">
    <main class="main-content">
        <div class="search-box">
            <input type="text" id="search" placeholder="Tìm kiếm tin tức...">
            <button onclick="getNews()">Tìm kiếm</button>
        </div>
        <section class="news-section">
            <h2 class="section-title"><span>●</span> Thông tin mới nhất</h2>
            <div class="swiper mySwiper">
                <div class="swiper-wrapper" id="news-container">
                    <div class="swiper-slide">Đang tải tin tức...</div>
                </div>   
                <div class="swiper-pagination"></div>
            </div>
        </section>
    </main>
</div>
<footer class="footer">
    <h3>Phong News</h3>
    <p>
        Cập nhật tin tức nhanh chóng và hiện đại.
    </p>
    <div class="footer-links">
        <a href="#">Trang chủ</a>
        <a href="#">Tin đọc sau</a>
        <a href="#">Liên hệ</a>
    </div>
    <p class="footer-copy">
        © 2026 Phong News
    </p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="home.js"></script>
</body>
</html>
