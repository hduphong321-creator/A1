<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Login</title>

</head>
<body>

<div class="box">
    <h2>Đăng nhập</h2>

    <form id="formLogin">

        <button type="submit">Đăng nhập</button>
    </form>

    <p id="msg"></p>

    <p>
        Chưa có tài khoản?
        <a href="index.html">Đăng ký</a>
    </p>
</div>

<script src="login.js"></script>
</body>
</html>
